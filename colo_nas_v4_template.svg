<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<!--
  Colo NAS Enclosure v4 — SendCutSend Template
  7.5" × 7.5" × 2.5"  (190.5 × 190.5 × 63.5 mm)
  
  4 pieces:
  1. U-channel body (bottom + front/back walls, 2 bends)
  2. Rear panel (I/O cutout + 60mm fan)
  3. Front panel (ventilation)
  4. Top panel (countersunk HDD holes + vents)
  
  Material: 18 ga (1.2mm) or 20 ga (0.9mm) CRS
  Bends: 90° along dashed lines
  
  IMPORTANT: Two 3.5" drives need 8"+ width for side-by-side.
  At 7.5" width, the HDDs overlap in XY — see the 3D model.
  Either widen this template, or mount one HDD on bottom panel
  (add bottom holes) and one from top.
-->
<svg width="750mm" height="500mm" viewBox="-50 -50 750 500" 
     xmlns="http://www.w3.org/2000/svg" version="1.1">
  
  <defs>
    <marker id="bend-line" viewBox="0 0 10 10" refX="5" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
    <pattern id="vent" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#ddd"/>
    </pattern>
  </defs>
  
  <!-- ==================== TITLE ==================== -->
  <text x="300" y="420" font-family="sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#333">
    Colo NAS Enclosure v4 — SendCutSend Template
  </text>
  <text x="300" y="438" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#666">
    7.5" × 7.5" × 2.5"  |  18 ga CRS (1.2mm)  |  4 pieces  |  90° bends on dashed red lines
  </text>
  
  <!-- ==================== PIECE 1: U-CHANNEL BODY ==================== -->
  <g transform="translate(10, 10)">
    <text x="95" y="-8" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">
      PIECE 1 — U-Channel Body (1 continuous piece, 2 bends)
    </text>
    
    <!-- Bottom panel (190.5 × 190.5mm) -->
    <rect x="0" y="0" width="190.5" height="190.5" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    
    <!-- Back wall (folds up) — 62.3mm tall × 190.5mm wide -->
    <rect x="-63.5" y="0" width="63.5" height="190.5" fill="#ddd" stroke="#333" stroke-width="0.8"/>
    <text x="-31.75" y="95" font-family="sans-serif" font-size="7" fill="#666" 
          text-anchor="middle" transform="rotate(-90, -31.75, 95)">Back Wall (fold up)</text>
    
    <!-- Front wall (folds up) — 62.3mm tall × 190.5mm wide -->
    <rect x="190.5" y="0" width="63.5" height="190.5" fill="#ddd" stroke="#333" stroke-width="0.8"/>
    <text x="222.25" y="95" font-family="sans-serif" font-size="7" fill="#666"
          text-anchor="middle" transform="rotate(-90, 222.25, 95)">Front Wall (fold up)</text>
    
    <!-- Bend lines (dashed red) -->
    <line x1="0" y1="0" x2="0" y2="190.5" stroke="#e74c3c" stroke-width="1.5" 
          stroke-dasharray="4,3"/>
    <line x1="190.5" y1="0" x2="190.5" y2="190.5" stroke="#e74c3c" stroke-width="1.5" 
          stroke-dasharray="4,3"/>
    
    <!-- Dimensions -->
    <text x="95" y="185" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#555">
      7.5" (190.5mm)
    </text>
    <text x="-55" y="95" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#555">
      2.5" (63.5mm)
    </text>
    <text x="205" y="95" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#555">
      2.5" (63.5mm)
    </text>
  </g>
  
  <!-- ==================== PIECE 2: REAR PANEL ==================== -->
  <g transform="translate(280, 10)">
    <text x="95" y="-8" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">
      PIECE 2 — Rear Panel (I/O cutout + 60mm fan)
    </text>
    
    <rect x="0" y="0" width="190.5" height="63.5" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    
    <!-- I/O shield cutout (144 × 44mm, centered) -->
    <rect x="23.25" y="9.75" width="144" height="44" fill="#ffccc" stroke="#c00" stroke-width="0.8"/>
    <text x="95.25" y="36" font-family="sans-serif" font-size="6" text-anchor="middle" fill="#600">
      I/O Shield Cutout (144×44mm)
    </text>
    
    <!-- 60mm fan cutout -->
    <rect x="140" y="1.75" width="48" height="60" fill="#ccf" stroke="#00c" stroke-width="0.8"/>
    <text x="164" y="35" font-family="sans-serif" font-size="5" text-anchor="middle" fill="#006">
      60mm Fan
    </text>
    
    <!-- Fan screw holes -->
    <circle cx="145" cy="6.75" r="2" fill="#333"/>
    <circle cx="183" cy="6.75" r="2" fill="#333"/>
    <circle cx="145" cy="56.75" r="2" fill="#333"/>
    <circle cx="183" cy="56.75" r="2" fill="#333"/>
    
    <text x="95" y="78" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#555">
      7.5" (190.5mm)
    </text>
  </g>
  
  <!-- ==================== PIECE 3: FRONT PANEL ==================== -->
  <g transform="translate(280, 100)">
    <text x="95" y="-8" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">
      PIECE 3 — Front Panel (ventilated)
    </text>
    
    <rect x="0" y="0" width="190.5" height="63.5" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    
    <!-- Vent slots -->
    <g fill="none" stroke="#999" stroke-width="0.5">
      <line x1="15" y1="12" x2="175" y2="12"/>
      <line x1="15" y1="24" x2="175" y2="24"/>
      <line x1="15" y1="36" x2="175" y2="36"/>
      <line x1="15" y1="48" x2="175" y2="48"/>
    </g>
    <g fill="#bbb">
      <circle cx="15" cy="12" r="1.5"/><circle cx="175" cy="12" r="1.5"/>
      <circle cx="15" cy="24" r="1.5"/><circle cx="175" cy="24" r="1.5"/>
      <circle cx="15" cy="36" r="1.5"/><circle cx="175" cy="36" r="1.5"/>
      <circle cx="15" cy="48" r="1.5"/><circle cx="175" cy="48" r="1.5"/>
    </g>
    
    <text x="95" y="78" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#555">
      7.5" (190.5mm)
    </text>
  </g>
  
  <!-- ==================== PIECE 4: TOP PANEL ==================== -->
  <g transform="translate(10, 230)">
    <text x="95" y="-8" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">
      PIECE 4 — Top Panel (countersunk HDD holes + ventilation)
    </text>
    
    <!-- Top panel outline -->
    <rect x="0" y="0" width="190.5" height="190.5" fill="#e8e8e8" stroke="#333" stroke-width="1"/>
    
    <!-- HDD1 mounting holes (front-left) — standard positions -->
    <g stroke="#c00" stroke-width="0.8" fill="none">
      <!-- A6 holes (front pair) -->
      <circle cx="14.35" cy="52.45" r="2.5"/>
      <circle cx="93.85" cy="52.45" r="2.5"/>
      <!-- A7 holes (rear pair) — 147-41.28=105.72mm from front of drive -->
      <circle cx="14.35" cy="113.72" r="2.5"/>
      <circle cx="93.85" cy="113.72" r="2.5"/>
      <!-- Alternate A13 holes -->
      <circle cx="14.35" cy="84.2" r="2" stroke-dasharray="2,2"/>
      <circle cx="93.85" cy="84.2" r="2" stroke-dasharray="2,2"/>
    </g>
    <text x="54" y="10" font-family="sans-serif" font-size="6" fill="#c00" text-anchor="middle">
      HDD1 (front-left) — 6-32 countersunk
    </text>
    
    <!-- HDD2 mounting holes (back-right) -->
    <g stroke="#c00" stroke-width="0.8" fill="none">
      <circle cx="96.65" cy="128.3" r="2.5"/>
      <circle cx="176.15" cy="128.3" r="2.5"/>
      <circle cx="96.65" cy="189.57" r="2.5"/>
      <circle cx="176.15" cy="189.57" r="2.5"/>
      <circle cx="96.65" cy="160.05" r="2" stroke-dasharray="2,2"/>
      <circle cx="176.15" cy="160.05" r="2" stroke-dasharray="2,2"/>
    </g>
    <text x="174" y="100" font-family="sans-serif" font-size="6" fill="#c00" text-anchor="end">
      HDD2 (back-right) — 6-32 countersunk
    </text>
    
    <!-- Vent holes -->
    <g fill="none" stroke="#888" stroke-width="0.5">
      <line x1="55" y1="18" x2="135" y2="18"/>
      <line x1="55" y1="24" x2="135" y2="24"/>
      <line x1="55" y1="170" x2="135" y2="170"/>
      <line x1="55" y1="176" x2="135" y2="176"/>
    </g>
    
    <!-- HDD overlap indicator -->
    <rect x="54" y="52" width="44" height="62" fill="none" stroke="#f80" stroke-width="1" 
          stroke-dasharray="3,3"/>
    <text x="76" y="88" font-family="sans-serif" font-size="5" fill="#f80" text-anchor="middle">
      OVERLAP
    </text>
    
    <text x="95" y="205" font-family="sans-serif" font-size="7" text-anchor="middle" fill="#555">
      7.5" (190.5mm)
    </text>
  </g>
  
  <!-- ==================== NOTES ==================== -->
  <g transform="translate(10, 445)">
    <text x="0" y="0" font-family="sans-serif" font-size="8" font-weight="bold" fill="#333">
      ASSEMBLY NOTES:
    </text>
    <text x="0" y="12" font-family="sans-serif" font-size="7" fill="#555">
      1. Fold Piece 1 into U-channel: back wall up 90°, front wall up 90°. Both walls fold TOWARD each other.
    </text>
    <text x="0" y="22" font-family="sans-serif" font-size="7" fill="#555">
      2. Weld or screw Piece 2 (rear panel) to back wall and Piece 3 (front panel) to front wall.
    </text>
    <text x="0" y="32" font-family="sans-serif" font-size="7" fill="#555">
      3. Attach M3×10mm standoffs to bottom panel at motherboard mounting holes.
    </text>
    <text x="0" y="42" font-family="sans-serif" font-size="7" fill="#555">
      4. Mount motherboard on standoffs, I/O shield aligned to rear panel cutout.
    </text>
    <text x="0" y="52" font-family="sans-serif" font-size="7" fill="#555">
      5. Mount HDDs to top panel with 6-32×3/16" flathead countersunk screws (rubber grommets recommended).
    </text>
    <text x="0" y="62" font-family="sans-serif" font-size="7" fill="#555">
      6. HDDs are upside-down (PCB faces top panel). Connect SATA cables before lowering top onto case.
    </text>
    
    <text x="350" y="12" font-family="sans-serif" font-size="8" font-weight="bold" fill="#c00">
      ⚠ HDD OVERLAP
    </text>
    <text x="350" y="24" font-family="sans-serif" font-size="7" fill="#555">
      Two 4" HDDs need 8"+ width to sit side-by-side. At 7.5" they overlap.
    </text>
    <text x="350" y="34" font-family="sans-serif" font-size="7" fill="#555">
      Fix: widen template to 8.25" (209.6mm), or mount one HDD on bottom.
    </text>
    <text x="350" y="44" font-family="sans-serif" font-size="7" fill="#555">
      See 3D model for visualization of the overlap.
    </text>
  </g>
</svg>
